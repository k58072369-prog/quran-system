kind = "web"
previewPath = "/"
title = "نظام إدارة الحلقات القرآنية"
version = "1.0.0"
id = "artifacts/quran-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25915

[services.development]
run = "pnpm --filter @workspace/quran-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-system", "run", "build" ]
publicDir = "artifacts/quran-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25915"
BASE_PATH = "/"
